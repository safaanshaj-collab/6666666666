{% extends "base.html" %}
{% block content %}
<div class="auth-layout">
  <div class="card auth-card">
    <div class="auth-logo">
      <img src="/static/img/logo.svg" alt="Py2APK" class="auth-logo-img" />
      <h1 class="auth-title">Py2APK</h1>
      <p class="auth-subtitle">Python to Android APK Builder</p>
    </div>

    {% if error %}
    <div class="alert alert--error">{{ error }}</div>
    {% end %}

    <form method="POST" action="/login" class="auth-form">
      <div class="form-field">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" name="username" class="form-input"
               required autofocus autocomplete="username" />
      </div>
      <div class="form-field">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input"
               required autocomplete="current-password" />
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-full">Sign In</button>
    </form>
  </div>
</div>
{% end %}
