{% extends "base.html" %}
{% block content %}
<div class="auth-layout">
  <div class="card auth-card">
    <div class="auth-logo">
      <h1 class="auth-title">Register User</h1>
      <p class="auth-subtitle">Create a new account (admin only)</p>
    </div>
    {% if error %}
    <div class="alert alert--error">{{ error }}</div>
    {% end %}
    <form method="POST" action="/register" class="auth-form">
      <div class="form-field">
        <label for="username" class="form-label">Username</label>
        <input type="text" id="username" name="username" class="form-input" required autofocus />
      </div>
      <div class="form-field">
        <label for="email" class="form-label">Email (optional)</label>
        <input type="email" id="email" name="email" class="form-input" />
      </div>
      <div class="form-field">
        <label for="password" class="form-label">Password</label>
        <input type="password" id="password" name="password" class="form-input" required minlength="8" />
      </div>
      <button type="submit" class="btn btn-primary btn-lg w-full">Create Account</button>
    </form>
    <div class="mt-2 text-center"><a href="/" class="link-subtle">← Back to Dashboard</a></div>
  </div>
</div>
{% end %}
